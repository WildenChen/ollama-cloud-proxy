services:
  ollama-cloud-proxy:
    image: ghcr.io/wildenchen/ollama-cloud-proxy:latest
    container_name: ollama-cloud-proxy
    restart: unless-stopped
    ports:
      - "11435:11435"
    env_file:
      - .env
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://127.0.0.1:11435/health'); if(!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
